      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=512
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/falcon_ai?schema=public
      WORKERS: 2
      THREADS: 2
      SOURCE_WORKERS: 2
      GUNICORN_TIMEOUT: 0
      GUNICORN_GRACEFUL_TIMEOUT: 30
      GUNICORN_MAX_REQUESTS: 300
      GUNICORN_MAX_REQUESTS_JITTER: 30
      NEWS_SCROLL_REFRESH_INTERVAL_SECONDS: 15
    shm_size: 4gb
    volumes:
    - worker_news_outputs:/app/outputs
    - ./apps/scrapers/worker-news/outputs:/app/outputs-host
    depends_on:
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
        reservations:
          memory: 1G
          cpus: '1'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - falcon-net
  worker-news-scheduler:
    build:
      context: ./apps/scrapers/worker-news
      dockerfile: Dockerfile
    container_name: worker-news-scheduler
    restart: unless-stopped
    environment:
      PORT: 3012
      REDIS_HOST: falcon-redis
      REDIS_PORT: 6379
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=512
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/falcon_ai?schema=public
      WORKERS: 1
      THREADS: 2
      SOURCE_WORKERS: 1
      GUNICORN_TIMEOUT: 0
      GUNICORN_GRACEFUL_TIMEOUT: 30
      GUNICORN_MAX_REQUESTS: 300
      GUNICORN_MAX_REQUESTS_JITTER: 30
      NEWS_SCROLL_REFRESH_INTERVAL_SECONDS: 15
    shm_size: 4gb
    volumes:
    - worker_news_outputs:/app/outputs
    - ./apps/scrapers/worker-news/outputs:/app/outputs-host
    depends_on:
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
