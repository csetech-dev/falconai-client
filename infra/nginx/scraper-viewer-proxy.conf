events {}

http {
  resolver 127.0.0.11 ipv6=off valid=10s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 12045;
    server_name _;

    location /vnc/ {
      set $worker_facebook_vnc worker-fb:7900;
      rewrite ^/vnc/?(.*)$ /$1 break;
      proxy_pass http://$worker_facebook_vnc;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      set $worker_facebook_api worker-fb:3010;
      proxy_pass http://$worker_facebook_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  server {
    listen 12060;
    server_name _;

    location /vnc/ {
      set $worker_linkedin_vnc worker-linkedin:7900;
